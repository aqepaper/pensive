<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>​</title>
<meta property="og:title" content="​" />
<meta property="og:description" content="​" />
<meta name="robots" content="noindex, nofollow">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #08061e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Noto Serif TC', serif;
  }

  /* ── 夜空漸層 ── */
  #sky {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(
      180deg,
      #08061e 0%, #110d35 25%, #1e1050 45%,
      #3d1a70 65%, #7b3fa0 80%, #c2607a 92%, #f0925a 100%
    );
  }

  /* ── 星星層 ── */
  #star-layer  { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ── 雲層 ── */
  #cloud-layer { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
  .cloud-svg {
    position: absolute; opacity: 0.18;
    animation: driftCloud linear infinite;
  }
  @keyframes driftCloud {
    from { transform: translateX(0); }
    to   { transform: translateX(-120vw); }
  }

  /* ── 粒子層 ── */
  #particle-layer { position: fixed; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }

  /* ── confetti ── */
  #confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 200;
  }

  /* ── 爆炸光暈背景 ── */
  #burst-bg {
    position: fixed; inset: 0; z-index: 4;
    background: transparent;
    pointer-events: none;
    transition: background 0.5s ease;
  }
  #burst-bg.active {
    background: radial-gradient(ellipse 90% 80% at 50% 50%,
      rgba(255,200,50,0.2) 0%, rgba(255,100,50,0.08) 40%, transparent 70%);
  }

  /* ── 場景 ── */
  .scene {
    position: relative;
    width: 300px;
    height: 200px;
    perspective: 800px;
    z-index: 10;
    cursor: pointer;
  }

  /* ── 搖晃 ── */
  @keyframes wiggle {
    0%,100%{transform:rotate(0deg) scale(1)}
    20%{transform:rotate(-4deg) scale(1.04)}
    40%{transform:rotate(4deg) scale(1.04)}
    60%{transform:rotate(-3deg) scale(1.02)}
    80%{transform:rotate(3deg) scale(1.02)}
  }
  .scene.wiggle { animation: wiggle 0.55s ease; }

  /* ── 信封四片 ── */
  .flap {
    position: absolute;
    transform-style: preserve-3d;
    overflow: hidden;
  }

  /* 上片 */
  .flap-top {
    top: 0; left: 0; right: 0;
    height: 50%;
    transform-origin: top center;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1) 0s;
    z-index: 4;
    background: linear-gradient(160deg, #e8dcb8 0%, #d4c890 100%);
    border-radius: 4px 4px 0 0;
  }
  .flap-top .face {
    position: absolute; inset: 0;
    background: transparent;
    border-radius: 4px 4px 0 0;
    overflow: visible;
  }
  .flap-top .face::after {
    content: '';
    position: absolute;
    top: 0; left: -4px; right: -4px;
    height: 100%;
    background: linear-gradient(175deg, #e8dcb8 0%, #c8bc8c 100%);
    clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
  }

  /* 下片 */
  .flap-bot {
    bottom: 0; left: 0; right: 0;
    height: 50%;
    transform-origin: bottom center;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1) 0.08s;
    z-index: 4;
  }
  .flap-bot .face {
    position: absolute; inset: 0;
    background: linear-gradient(5deg, #e0d4b0 0%, #cfc39c 100%);
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .flap-bot .face::after {
    content: '';
    position: absolute;
    bottom: -10px; left: -10px; right: -10px;
    height: 200%;
    background: linear-gradient(5deg, #d8cc9e 0%, #c8bc8c 100%);
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  }

  /* 左片 */
  .flap-left {
    top: 0; left: 0; bottom: 0;
    width: 50%;
    transform-origin: left center;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1) 0.04s;
    z-index: 3;
  }
  .flap-left .face {
    position: absolute; inset: 0;
    background: linear-gradient(100deg, #ddd4b0 0%, #ccc09a 100%);
    overflow: hidden;
  }
  .flap-left .face::after {
    content: '';
    position: absolute;
    top: -10px; bottom: -10px; left: -10px;
    width: 200%;
    background: linear-gradient(100deg, #d4c9a4 0%, #c8bc90 100%);
    clip-path: polygon(0 0, 100% 50%, 0 100%);
  }

  /* 右片 */
  .flap-right {
    top: 0; right: 0; bottom: 0;
    width: 50%;
    transform-origin: right center;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1) 0.04s;
    z-index: 3;
  }
  .flap-right .face {
    position: absolute; inset: 0;
    background: linear-gradient(80deg, #ccc09a 0%, #ddd4b0 100%);
    overflow: hidden;
  }
  .flap-right .face::after {
    content: '';
    position: absolute;
    top: -10px; bottom: -10px; right: -10px;
    width: 200%;
    background: linear-gradient(80deg, #c8bc90 0%, #d4c9a4 100%);
    clip-path: polygon(100% 0, 0 50%, 100% 100%);
  }

  /* 封蠟 */
  .wax {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 42px; height: 42px;
    background: radial-gradient(circle at 35% 35%, #e74c3c, #8e1a10);
    border-radius: 50%;
    z-index: 6;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.85);
    font-size: 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.25);
    transition: transform 0.25s ease, opacity 0.25s ease;
  }

  /* ── 爆炸後四片飛出 ── */
  .scene.exploded .flap-top  { transform: rotateX(-160deg); }
  .scene.exploded .flap-bot  { transform: rotateX(160deg); }
  .scene.exploded .flap-left { transform: rotateY(-160deg); }
  .scene.exploded .flap-right{ transform: rotateY(160deg); }
  .scene.exploded .wax {
    transform: translate(-50%, -50%) scale(0) rotate(180deg);
    opacity: 0;
  }

  /* ── 名字層 ── */
  .name-layer {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 2; pointer-events: none;
  }
  .name {
    font-size: 50px; font-weight: 900;
    color: #fff; letter-spacing: 0.1em;
    opacity: 0; transform: scale(0.1);
    text-shadow:
      0 0 30px rgba(255,220,80,0.9),
      0 0 60px rgba(255,180,40,0.6),
      0 0 100px rgba(255,140,20,0.4),
      2px 2px 0 rgba(0,0,0,0.3);
    transition: opacity 0.5s ease 0.6s,
                transform 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.6s;
  }
  .scene.exploded .name { opacity: 1; transform: scale(1); }

  /* ── 光環 ── */
  .halo {
    position: absolute; inset: -20px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,210,60,0.35) 0%, transparent 70%);
    opacity: 0; transform: scale(0.3);
    transition: opacity 0.4s ease 0.7s, transform 0.6s ease 0.7s;
    z-index: 1;
  }
  .scene.exploded .halo { opacity: 1; transform: scale(1.8); }

  /* ── 放射線 ── */
  .rays {
    position: absolute; inset: -60px;
    opacity: 0; transition: opacity 0.3s ease 0.65s;
    z-index: 1; pointer-events: none;
  }
  .scene.exploded .rays { opacity: 1; }

  /* ── 提示 & 按鈕 ── */
  .hint {
    margin-top: 36px;
    color: rgba(255,230,160,0.5);
    font-size: 13px; letter-spacing: 0.2em;
    z-index: 10; transition: opacity 0.4s;
    text-shadow: 0 0 12px rgba(245,200,66,0.3);
    animation: hintPulse 3s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%,100%{ opacity: 0.4; }
    50%    { opacity: 0.85; }
  }
  .hint.hide { opacity: 0 !important; pointer-events: none; animation: none; }

  .replay {
    margin-top: 24px; padding: 8px 28px;
    background: transparent;
    border: 1px solid rgba(255,200,100,0.3);
    color: rgba(255,220,160,0.6);
    border-radius: 20px; font-size: 13px;
    font-family: 'Noto Serif TC', serif;
    letter-spacing: 0.15em; cursor: pointer;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.5s ease 1.4s, transform 0.5s ease 1.4s,
                background 0.2s, color 0.2s;
    pointer-events: none; z-index: 10;
  }
  .replay.show { opacity: 1; transform: translateY(0); pointer-events: all; }
  .replay:hover { background: rgba(255,200,80,0.12); color: #fff; }
</style>
</head>
<body>

<!-- 背景層 -->
<div id="sky"></div>
<canvas id="star-layer"></canvas>
<div id="cloud-layer"></div>
<canvas id="particle-layer"></canvas>
<div id="burst-bg"></div>
<canvas id="confetti-canvas"></canvas>

<!-- 主體 -->
<div class="scene" id="scene" onclick="triggerOpen()">
  <svg class="rays" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(150,150)">
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.5)" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.5)" stroke-width="3" stroke-linecap="round" transform="rotate(30)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.5)" stroke-width="3" stroke-linecap="round" transform="rotate(60)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.5)" stroke-width="3" stroke-linecap="round" transform="rotate(90)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.5)" stroke-width="3" stroke-linecap="round" transform="rotate(120)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.5)" stroke-width="3" stroke-linecap="round" transform="rotate(150)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.4)" stroke-width="2" stroke-linecap="round" transform="rotate(180)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.4)" stroke-width="2" stroke-linecap="round" transform="rotate(210)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.4)" stroke-width="2" stroke-linecap="round" transform="rotate(240)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.4)" stroke-width="2" stroke-linecap="round" transform="rotate(270)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.4)" stroke-width="2" stroke-linecap="round" transform="rotate(300)"/>
      <line x1="0" y1="-130" x2="0" y2="-100" stroke="rgba(255,210,60,0.4)" stroke-width="2" stroke-linecap="round" transform="rotate(330)"/>
    </g>
  </svg>
  <div class="halo"></div>
  <div class="flap flap-top"><div class="face"></div></div>
  <div class="flap flap-bot"><div class="face"></div></div>
  <div class="flap flap-left"><div class="face"></div></div>
  <div class="flap flap-right"><div class="face"></div></div>
  <div class="wax">✦</div>
  <div class="name-layer"><span class="name">玥玥好可愛</span></div>
</div>

<p class="hint" id="hint">點擊信封以開啟</p>
<button class="replay" id="replay" onclick="resetAll()">↺ 再來一次</button>

<script>
// ═══════════════════════════════════════
//  星星背景 (動態閃爍)
// ═══════════════════════════════════════
const starCanvas = document.getElementById('star-layer');
const sCtx = starCanvas.getContext('2d');
const stars = [];

function resizeStarCanvas() {
  starCanvas.width  = window.innerWidth;
  starCanvas.height = window.innerHeight;
  buildStars();
}
function buildStars() {
  stars.length = 0;
  const n = Math.floor((window.innerWidth * window.innerHeight) / 2800);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height * 0.75,
      r: Math.random() * 1.4 + 0.3,
      speed: Math.random() * 0.012 + 0.004,
      phase: Math.random() * Math.PI * 2
    });
  }
}
function animateStars(t) {
  sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  stars.forEach(s => {
    const a = 0.35 + 0.65 * Math.abs(Math.sin(t * s.speed + s.phase));
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(255,245,200,${a})`;
    sCtx.fill();
  });
}
resizeStarCanvas();
window.addEventListener('resize', resizeStarCanvas);

// ═══════════════════════════════════════
//  飄雲
// ═══════════════════════════════════════
const cloudLayer = document.getElementById('cloud-layer');
function makeClouds() {
  cloudLayer.innerHTML = '';
  const cloudDefs = [
    { top: '10%', w: 220, dur: 90,  delay: 0   },
    { top: '22%', w: 160, dur: 130, delay: -40  },
    { top: '36%', w: 260, dur: 110, delay: -20  },
    { top: '16%', w: 140, dur: 150, delay: -70  },
    { top: '42%', w: 200, dur: 100, delay: -55  },
  ];
  const ns = 'http://www.w3.org/2000/svg';
  cloudDefs.forEach(c => {
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 240 80');
    svg.setAttribute('width', c.w);
    svg.setAttribute('height', c.w / 3);
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d','M30 60 Q10 60 10 45 Q10 30 25 28 Q22 12 40 12 Q50 2 65 10 Q75 2 90 8 Q110 0 120 15 Q140 5 155 18 Q170 10 185 22 Q205 18 210 35 Q220 38 215 52 Q215 60 200 62 Z');
    path.setAttribute('fill', 'white');
    svg.appendChild(path);
    svg.classList.add('cloud-svg');
    svg.style.top = c.top;
    svg.style.left = `${window.innerWidth + 50}px`;
    svg.style.animationDuration = `${c.dur}s`;
    svg.style.animationDelay = `${c.delay}s`;
    cloudLayer.appendChild(svg);
  });
}
makeClouds();
window.addEventListener('resize', makeClouds);

// ═══════════════════════════════════════
//  金色上升粒子
// ═══════════════════════════════════════
const pCanvas = document.getElementById('particle-layer');
const pCtx = pCanvas.getContext('2d');
const bgParticles = [];

function resizePCanvas() {
  pCanvas.width  = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizePCanvas();
window.addEventListener('resize', resizePCanvas);

function spawnBgParticles() {
  for (let i = 0; i < 2; i++) {
    bgParticles.push({
      x: Math.random() * pCanvas.width,
      y: pCanvas.height + 10,
      vx: (Math.random() - 0.5) * 0.5,
      vy: -(Math.random() * 0.5 + 0.3),
      r: Math.random() * 2 + 0.5,
      a: Math.random() * 0.5 + 0.2,
      life: 1,
      decay: Math.random() * 0.002 + 0.001,
      color: Math.random() < 0.55 ? '245,200,66' : '255,160,100'
    });
  }
}
function animateBgParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  for (let i = bgParticles.length - 1; i >= 0; i--) {
    const p = bgParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { bgParticles.splice(i, 1); continue; }
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(${p.color},${p.a * p.life})`;
    pCtx.fill();
  }
}

// ═══════════════════════════════════════
//  Confetti
// ═══════════════════════════════════════
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const COLORS = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#FF8E53',
                 '#A8E6CF','#FFB347','#DDA0DD','#87CEEB','#FF69B4',
                 '#98FB98','#FFA07A','#00CED1','#FF1493','#7B68EE'];

class Piece {
  constructor(x, y, burst) {
    this.x = x; this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = burst ? (Math.random() * 22 + 10) : (Math.random() * 4 + 1);
    this.vx = Math.cos(angle) * speed;
    this.vy = burst ? (Math.sin(angle) * speed - Math.random() * 8) : (Math.random() * 3 + 1);
    this.gravity = burst ? 0.5 : 0.25;
    this.drag = 0.97;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.w = Math.random() * 11 + 4;
    this.h = Math.random() * 6 + 3;
    this.tilt = Math.random() * Math.PI * 2;
    this.tiltV = (Math.random() - 0.5) * 0.28;
    this.shape = Math.random() < 0.55 ? 'rect' : 'circle';
    this.alpha = 1;
    this.fade = Math.random() * 0.01 + 0.006;
  }
  update() {
    this.vy += this.gravity;
    this.vx *= this.drag; this.vy *= this.drag;
    this.x += this.vx; this.y += this.vy;
    this.tilt += this.tiltV;
    this.alpha -= this.fade;
  }
  draw(c) {
    c.save();
    c.globalAlpha = Math.max(0, this.alpha);
    c.fillStyle = this.color;
    c.translate(this.x, this.y);
    c.rotate(this.tilt);
    if (this.shape === 'rect') {
      c.fillRect(-this.w/2, -this.h/2, this.w, this.h);
    } else {
      c.beginPath();
      c.ellipse(0, 0, this.w/2, this.h/2, 0, 0, Math.PI*2);
      c.fill();
    }
    c.restore();
  }
}

let pieces = [];
let rafId = null;

function spawnBurst(x, y, n) {
  for (let i = 0; i < n; i++) pieces.push(new Piece(x, y, true));
}
function spawnRain(n) {
  for (let i = 0; i < n; i++) {
    const p = new Piece(Math.random() * canvas.width, -12, false);
    p.vx = (Math.random() - 0.5) * 3;
    p.vy = Math.random() * 3 + 1.5;
    p.gravity = 0.18;
    p.fade = 0.004;
    pieces.push(p);
  }
}
function confettiLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  pieces = pieces.filter(p => p.alpha > 0 && p.y < canvas.height + 60);
  pieces.forEach(p => { p.update(); p.draw(ctx); });
  if (pieces.length > 0) rafId = requestAnimationFrame(confettiLoop);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ═══════════════════════════════════════
//  主動畫 loop（星星 + 背景粒子）
// ═══════════════════════════════════════
let lastSpawn = 0;
function mainLoop(ts) {
  animateStars(ts / 1000);
  animateBgParticles();
  if (ts - lastSpawn > 500) { spawnBgParticles(); lastSpawn = ts; }
  requestAnimationFrame(mainLoop);
}
requestAnimationFrame(mainLoop);

// ═══════════════════════════════════════
//  信封互動
// ═══════════════════════════════════════
let triggered = false;

function triggerOpen() {
  if (triggered) return;
  triggered = true;

  const scene = document.getElementById('scene');

  scene.classList.add('wiggle');
  setTimeout(() => {
    scene.classList.remove('wiggle');
    scene.classList.add('exploded');
    document.getElementById('burst-bg').classList.add('active');

    const rect = scene.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    spawnBurst(cx, cy, 200);
    confettiLoop();
    setTimeout(() => spawnBurst(cx, cy, 150), 180);
    setTimeout(() => spawnRain(100), 350);
    setTimeout(() => spawnRain(80), 700);

    document.getElementById('hint').classList.add('hide');
    document.getElementById('replay').classList.add('show');
  }, 560);
}

function resetAll() {
  triggered = false;
  const scene = document.getElementById('scene');
  scene.classList.remove('exploded', 'wiggle');
  document.getElementById('hint').classList.remove('hide');
  document.getElementById('replay').classList.remove('show');
  document.getElementById('burst-bg').classList.remove('active');
  pieces = [];
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>
</body>
</html>
